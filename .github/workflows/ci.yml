name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ============== 1. 정적 분석 ==============
  static-analysis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install linting tools
      run: pip install ruff
    - name: Lint (critical errors only)
      run: ruff check --select E9,F63,F7,F82 .
    - name: Verify settings import
      run: |
        pip install -r requirements.txt
        python -c "from config.settings import settings; print('Settings OK')"

  # ============== 2. 단위 테스트 (배포 게이트) ==============
  unit-tests:
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov
    - name: Run unit tests
      env:
        TEST_RUN: "True"
      run: pytest tests/ -v --ignore=tests/temp --ignore=tests/bench_*.py --cov=. --cov-report=xml
    - name: Upload coverage report
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
      continue-on-error: true

  # ============== 3. 보안 스캔 ==============
  security-scan:
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
    - uses: actions/checkout@v4
    - name: Trivy filesystem scan (PR — 빠른 스캔)
      if: github.event_name == 'pull_request'
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL'
    - name: Build Docker image (main push only)
      if: github.event_name == 'push'
      run: docker build -t finance-bot:scan .
    - name: Trivy image scan (main push — 전체 스캔)
      if: github.event_name == 'push'
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'finance-bot:scan'
        format: 'table'
        exit-code: '1'
        severity: 'CRITICAL,HIGH'

  # ============== 4. Staging 배포 ==============
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [unit-tests, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
    - name: Deploy to Staging
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        command_timeout: 30m
        script: |
          cd ${{ secrets.STAGING_DEPLOY_PATH }}
          git config --global --add safe.directory ${{ secrets.STAGING_DEPLOY_PATH }}
          git pull origin main
          export AUTO_PROMOTE=1
          export PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          bash deploy/blue_green_switch.sh

  # ============== 5. Smoke Test (Staging 헬스체크) ==============
  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Check Staging Container Health
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        command_timeout: 5m
        script: bash ${{ secrets.STAGING_DEPLOY_PATH }}/deploy/smoke_test.sh

  # ============== 6. Prod 배포 ==============
  deploy-prod:
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
    - name: Deploy to Production (Blue-Green)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        command_timeout: 30m
        script: |
          cd ${{ secrets.SERVER_DEPLOY_PATH }}
          git config --global --add safe.directory ${{ secrets.SERVER_DEPLOY_PATH }}
          git pull origin main
          export AUTO_PROMOTE=1
          export PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          bash deploy/blue_green_switch.sh

  # ============== 7. 자동 롤백 (Prod 배포 실패 시) ==============
  auto-rollback:
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - name: Rollback Production
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        command_timeout: 10m
        script: |
          cd ${{ secrets.SERVER_DEPLOY_PATH }}
          bash deploy/rollback.sh
    - name: Notify rollback via Telegram
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_ALERT_CHAT_ID }}" \
          -d text="⚠️ [CI/CD] Prod 배포 실패 — 자동 롤백 실행됨%0ACommit: ${{ github.sha }}%0AAuthor: ${{ github.actor }}"
