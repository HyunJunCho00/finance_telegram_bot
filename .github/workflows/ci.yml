name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGION: asia-southeast1
  PROJECT_ID: mcpknu-493907
  IMAGE_BASE: asia-southeast1-docker.pkg.dev/mcpknu-493907/crypto-bot/crypto-bot

jobs:
  # ── 정적 분석 ──────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff
      - name: Syntax errors + undefined names
        run: ruff check --select E9,F63,F7,F82 .
      - name: Settings import check
        run: |
          pip install -r requirements.txt
          python -c "from config.settings import settings; print('Settings OK')"

  # ── 스모크 & 통합 테스트 ────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt pytest pytest-timeout
      - name: Smoke & integration tests (no external deps)
        run: pytest ci_tests/test_smoke.py ci_tests/test_pipeline_integration.py -v --timeout=60

  # ── 보안 스캔 ──────────────────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - run: docker build -t finance-bot:scan .
      - uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8  # v0.28.0
        with:
          image-ref: finance-bot:scan
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

  # ── Docker 빌드 & Artifact Registry 푸시 ──────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image: ${{ env.IMAGE_BASE }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193  # v2.1.10
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a  # v2.1.4
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Build & push
        run: |
          docker build \
            -t ${{ env.IMAGE_BASE }}:${{ github.sha }} \
            -t ${{ env.IMAGE_BASE }}:latest \
            .
          docker push ${{ env.IMAGE_BASE }}:${{ github.sha }}
          docker push ${{ env.IMAGE_BASE }}:latest

  # ── Cloud Run Jobs 업데이트 ────────────────────────────────────────────────
  deploy-cloud-run:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: google-github-actions/auth@ba79af03959ebeac9769e648f473a284504d9193  # v2.1.10
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a  # v2.1.4
      - name: Update all Cloud Run Jobs
        run: |
          IMAGE=${{ env.IMAGE_BASE }}:${{ github.sha }}
          JOBS=(
            etf-flow stablecoin coinglass dune
            telegram-batch crypto-news
            market-status snapshot-narrative hourly-monitor
            daily-precision-btcusdt daily-precision-ethusdt
            evaluation evaluation-rollup evaluation-24h
          )
          for job in "${JOBS[@]}"; do
            gcloud run jobs update "$job" \
              --image="$IMAGE" \
              --project=${{ env.PROJECT_ID }} \
              --region=${{ env.REGION }} \
              --network=default \
              --subnet=default \
              --vpc-egress=private-ranges-only \
              --quiet || echo "WARNING: $job update failed"
          done

  # ── VM 배포 ───────────────────────────────────────────────────────────────
  # self-hosted runner가 VM에서 직접 실행 → IAP/SSH 불필요
  deploy-vm:
    runs-on: [self-hosted, linux, crypto-vm]
    needs: build-push
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Deploy on VM
        run: |
          DEPLOY_IMAGE=${{ env.IMAGE_BASE }}:${{ github.sha }}
          sudo git -C /opt/app pull origin main
          DEPLOY_IMAGE=$DEPLOY_IMAGE sudo -E bash /opt/app/deploy/ci_deploy.sh
