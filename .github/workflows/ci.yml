name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy
        
    - name: Lint with Ruff (Syntax errors and style)
      run: |
        # Exit if there are critically flawed syntax errors
        ruff check --select E9,F63,F7,F82 .
        
    - name: Verify Environment Configuration
      run: |
        # Verify settings proxy works without crashing
        pip install -r requirements.txt
        python -c "from config.settings import settings; print('Settings parsed successfully')"

  docker-build-test:
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
    - uses: actions/checkout@v4
    - name: Run Pytest (단위/논리 검증)
      env:
        TEST_RUN: "True"
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
        pytest tests/

  # ============== 보안 스캐닝 (도커 이미지 취약점 검사) ==============
  security-scan:
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
    - uses: actions/checkout@v3
    - name: Build local image for scanning
      run: docker build -t finance-bot:scan .
    - name: Run Trivy vulnerability scanner (해킹/취약점 백도어 차단)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'finance-bot:scan'
        format: 'table'
        exit-code: '0' 
        severity: 'CRITICAL,HIGH'

  # ============== CD (자동 배포) 단계: IAP Tunneling (보안 강화형) ==============
  deploy:
    runs-on: ubuntu-latest
    needs: [static-analysis, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - uses: actions/checkout@v4

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: 'Write SSH private key'
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/google_compute_engine
        chmod 600 ~/.ssh/google_compute_engine
        ssh-keygen -y -f ~/.ssh/google_compute_engine > ~/.ssh/google_compute_engine.pub

    - name: 'Deploy via SSH IAP Tunneling'
      env:
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      run: |
        gcloud compute ssh crypto-trading-vm-new \
          --zone=asia-southeast1-b \
          --project="$GCP_PROJECT_ID" \
          --tunnel-through-iap \
          --quiet \
          --ssh-key-file=~/.ssh/google_compute_engine \
          --ssh-flag="-o StrictHostKeyChecking=no" \
          --command="sudo git config --global --add safe.directory /opt/app && sudo git -C /opt/app pull origin main && export PROJECT_ID=$GCP_PROJECT_ID && sudo -E bash /opt/app/deploy/ci_deploy.sh"
