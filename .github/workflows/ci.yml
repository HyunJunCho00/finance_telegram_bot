name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy
        
    - name: Lint with Ruff (Syntax errors and style)
      run: |
        # Exit if there are critically flawed syntax errors
        ruff check --select E9,F63,F7,F82 .
        
    - name: Verify Environment Configuration
      run: |
        # Verify settings proxy works without crashing
        pip install -r requirements.txt
        python -c "from config.settings import settings; print('Settings parsed successfully')"

  docker-build-test:
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
    - uses: actions/checkout@v4
    - name: Run Pytest (단위/논리 검증)
      env:
        TEST_RUN: "True"
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
        pytest tests/

  # ============== 보안 스캐닝 (도커 이미지 취약점 검사) ==============
  security-scan:
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
    - uses: actions/checkout@v3
    - name: Build local image for scanning
      run: docker build -t finance-bot:scan .
    - name: Run Trivy vulnerability scanner (해킹/취약점 백도어 차단)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'finance-bot:scan'
        format: 'table'
        exit-code: '0' 
        severity: 'CRITICAL,HIGH'

  # ============== CD (자동 배포) 단계: IAP Tunneling (보안 강화형) ==============
  deploy:
    runs-on: ubuntu-latest
    needs: [static-analysis, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - uses: actions/checkout@v4

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: 'Deploy via SSH IAP Tunneling'
      uses: 'google-github-actions/ssh-compute@v1'
      with:
        instance_name: 'crypto-trading-vm-new'
        zone: 'asia-southeast1-b'
        project_id: '${{ secrets.GCP_PROJECT_ID }}'
        ssh_private_key: '${{ secrets.SERVER_SSH_KEY }}'
        command: |
          # 서버 내 봇 폴더로 이동
          cd /opt/app
          
          # Git 권한 방어 (루트/사용자 모두)
          git config --global --add safe.directory /opt/app
          
          # 최신 코드 깃허브에서 땡겨오기
          git pull origin main
          
          # Blue-Green 무중단 교체 스크립트 실행 (Docker 기반)
          export AUTO_PROMOTE=1
          export PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          bash deploy/blue_green_switch.sh
