name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGION: asia-southeast1
  PROJECT_ID: mcpknu-493907
  IMAGE_BASE: asia-southeast1-docker.pkg.dev/mcpknu-493907/crypto-bot/crypto-bot

jobs:
  # ── 정적 분석 ──────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff
      - name: Syntax errors + undefined names
        run: ruff check --select E9,F63,F7,F82 .
      - name: Settings import check
        run: |
          pip install -r requirements.txt
          python -c "from config.settings import settings; print('Settings OK')"

  # ── 보안 스캔 ──────────────────────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t finance-bot:scan .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: finance-bot:scan
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

  # ── Docker 빌드 & Artifact Registry 푸시 ──────────────────────────────────
  build-push:
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image: ${{ env.IMAGE_BASE }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Build & push
        run: |
          docker build \
            -t ${{ env.IMAGE_BASE }}:${{ github.sha }} \
            -t ${{ env.IMAGE_BASE }}:latest \
            .
          docker push ${{ env.IMAGE_BASE }}:${{ github.sha }}
          docker push ${{ env.IMAGE_BASE }}:latest

  # ── Cloud Run Jobs 업데이트 ────────────────────────────────────────────────
  deploy-cloud-run:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Update all Cloud Run Jobs
        run: |
          IMAGE=${{ env.IMAGE_BASE }}:${{ github.sha }}
          JOBS=(
            etf-flow stablecoin coinglass dune
            telegram-batch crypto-news
            market-status snapshot-narrative hourly-monitor
            daily-precision-btcusdt daily-precision-ethusdt
            evaluation evaluation-rollup evaluation-24h
          )
          for job in "${JOBS[@]}"; do
            gcloud run jobs update "$job" \
              --image="$IMAGE" \
              --project=${{ env.PROJECT_ID }} \
              --region=${{ env.REGION }} \
              --quiet || echo "WARNING: $job update failed"
          done

  # ── VM 배포 ───────────────────────────────────────────────────────────────
  # docker build를 VM에서 하지 않고 Artifact Registry 이미지를 pull
  deploy-vm:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/google_compute_engine
          chmod 600 ~/.ssh/google_compute_engine
          ssh-keygen -y -f ~/.ssh/google_compute_engine > ~/.ssh/google_compute_engine.pub
      - name: Deploy via IAP
        run: |
          IMAGE=${{ env.IMAGE_BASE }}:${{ github.sha }}
          gcloud compute ssh ${{ secrets.VM_NAME }} \
            --zone=${{ secrets.VM_ZONE }} \
            --project=${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --quiet \
            --ssh-key-file=~/.ssh/google_compute_engine \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --ssh-flag="-o ConnectTimeout=30" \
            --command="sudo git -C /opt/app pull origin main && DEPLOY_IMAGE=$IMAGE sudo -E bash /opt/app/deploy/ci_deploy.sh"
