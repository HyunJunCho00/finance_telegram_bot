name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy
        
    - name: Lint with Ruff (Syntax errors and style)
      run: |
        # Exit if there are critically flawed syntax errors
        ruff check --select E9,F63,F7,F82 .
        
    - name: Verify Environment Configuration
      run: |
        # Verify settings proxy works without crashing
        pip install -r requirements.txt
        python -c "from config.settings import settings; print('Settings parsed successfully')"

  docker-build-test:
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
    - uses: actions/checkout@v4
    - name: Run Pytest (단위/논리 검증)
      env:
        TEST_RUN: "True"
      run: |
        pip install pytest
        pytest tests/

  # ============== 보안 스캐닝 (도커 이미지 취약점 검사) ==============
  security-scan:
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
    - uses: actions/checkout@v3
    - name: Build local image for scanning
      run: docker build -t finance-bot:scan .
    - name: Run Trivy vulnerability scanner (해킹/취약점 백도어 차단)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'finance-bot:scan'
        format: 'table'
        exit-code: '0' # 취약점 발견되더라도 강제 중단은 안하게 임시 세팅 (운영 전환 시 1로 변경)
        severity: 'CRITICAL,HIGH'

  # ============== CD (자동 배포) 단계 ==============
  deploy:
    runs-on: ubuntu-latest
    needs: [static-analysis, security-scan]  # 코드 에러 없고 보안스캔 통과시 배포
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' # main에 push될 때만
    steps:
    - name: SSH Server Deployment (Blue/Green Switch)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}     # 서버 IP
        username: ${{ secrets.SERVER_USER }} # 서버 아이디
        key: ${{ secrets.SERVER_SSH_KEY }}   # 접속용 Private Key
        command_timeout: 30m                 # 긴 도커 빌드 시간(최대 30분) 허용
        script: |
          # 서버 내 봇 폴더로 이동 (GitHub Secrets에서 경로 불러옴)
          cd ${{ secrets.SERVER_DEPLOY_PATH }}
          
          # Git 권한(Dubious ownership) 에러 방어 코드
          git config --global --add safe.directory ${{ secrets.SERVER_DEPLOY_PATH }}
          
          # 최신 코드 깃허브에서 땡겨오기
          git pull origin main
          
          # Blue-Green 무중단 교체 스크립트 실행 (무인 자동화 모드)
          export AUTO_PROMOTE=1
          export PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          bash deploy/blue_green_switch.sh
